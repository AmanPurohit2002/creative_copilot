services:
  redis:
    image: redis/redis-stack-server:latest
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - copilot-net

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: copilot-backend
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
    ports:
      - "8001:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - copilot-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: copilot-frontend
    ports:
      - "3080:80"
    depends_on:
      - backend
    networks:
      - copilot-net
    restart: unless-stopped

networks:
  copilot-net:
    driver: bridge

volumes:
  redis_data:
